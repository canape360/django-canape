{% extends "base.html" %}
{% block content %}
<h1>ユーザー登録</h1>

{% if form.errors %}
  <div style="padding:10px; background:#fee; border:1px solid #f99;">
    <p><strong>入力エラーがあります：</strong></p>
    {{ form.errors }}
  </div>
{% endif %}

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">登録</button>
</form>

<p><a href="{% url 'login' %}">ログインはこちら</a></p>
{% endblock %}
