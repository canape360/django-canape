<!-- diaryapp/templates/diaryapp/diary_confirm_delete.html -->
 {% extends "base.html" %}
{% block content %}
<h1>削除確認</h1>

<p>「{{ object.title }}」を削除します。よろしいですか？</p>

<form method="post">
  {% csrf_token %}
  <button type="submit">削除する</button>
</form>

<p><a href="{% url 'diaryapp:detail' object.pk %}">戻る</a></p>
{% endblock %}
