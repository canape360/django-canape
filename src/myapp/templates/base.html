{% load static %}
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}My Django App{% endblock %}</title>

  <link rel="icon" href="{% static 'hana.ico' %}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">

  <!-- ★ CSSは head の中に1回だけ -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>

<body>
<header>
  <nav class="navbar navbar-dark bg-primary px-3">
    <style>
      .navbar a { color: white; text-decoration: none; margin-right: 10px; }
    </style>
 
  <a href="/">Home</a>
  <a href="{% url 'myapp:list' %}">日記情報</a>

  <a href="{% url 'myapp:detail' 13 %}">詳しい情報</a>

  <a href="{% url 'myapp:form' %}">投稿フォーム</a>

  <a href="{% url 'myapp:mymail' %}">コンタクト</a>

  <a href="{% url 'login' %}">管理ログイン</a>

  <a href="/admin/">管理サイト</a>

  <a href="{% url 'myapp:person_list' %}">人物情報</a>
</nav>
</header>

<main class="container my-4">
  {% block content %}{% endblock %}
</main>

<footer class="bg-primary text-white text-center py-3">
  <small>&copy; 2026 My Django App</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
