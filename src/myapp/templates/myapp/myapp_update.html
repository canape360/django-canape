{% extends "base.html" %}

{% block title %}日記を編集{% endblock %}

{% block content %}
<div class="container mt-4">

  <h1 class="mb-4">日記を編集</h1>

  {% if form.errors %}
    <div class="alert alert-danger">
      {{ form.errors }}
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <div class="mb-3">
      {{ form.as_p }}
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        更新する
      </button>

      <a href="{% url 'myapp:detail' object.pk %}" class="btn btn-secondary">
        詳細へ戻る
      </a>
    </div>
  </form>

</div>
{% endblock %}
