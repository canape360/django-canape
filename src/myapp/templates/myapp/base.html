<!-- django-canape/src/myapp/templates/myapp/base.html -->
{% load static %}
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}My Django App{% endblock %}</title>

  <link rel="icon" href="{% static 'cat.ico' %}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>

<body>
<header>
  <nav class="navbar navbar-dark bg-primary px-3">
    <a class="navbar-brand text-white text-decoration-none me-3" href="/">Home</a>
    <a class="text-white text-decoration-none me-3" href="{% url 'diaryapp:list' %}">日記一覧</a>
    <a class="text-white text-decoration-none me-3" href="{% url 'diaryapp:create' %}">新規投稿</a>
    <a class="text-white text-decoration-none me-3" href="{% url 'diaryapp:public_list' %}">公開日記</a>
    <a class="text-white text-decoration-none me-3" href="{% url 'myapp:mymail' %}">コンタクト</a>

    <div class="ms-auto d-flex align-items-center gap-2">
      {% if user.is_authenticated %}
        <span class="text-white">こんにちは {{ user.username }}</span>
        {% if user.is_staff %}
          <a class="text-white text-decoration-none me-2" href="/admin/">管理サイト</a>
        {% endif %}
        <form action="{% url 'logout' %}" method="post" class="m-0">
          {% csrf_token %}
          <button type="submit" class="btn btn-light btn-sm">ログアウト</button>
        </form>
      {% else %}
        <a class="text-white text-decoration-none me-2" href="{% url 'login' %}">ログイン</a>
        <a class="text-white text-decoration-none" href="{% url 'signup' %}">新規登録</a>
      {% endif %}
    </div>
  </nav>
</header>

<main class="container my-4">
  {% block content %}{% endblock %}
</main>

<footer class="bg-primary text-white text-center py-3">
  <small>&copy; 2026 Django Canape</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
