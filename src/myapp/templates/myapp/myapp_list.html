{% extends "myapp/base.html" %}

{% block title %}日記一覧{% endblock %}

{% block content %}
<div class="container mt-4">

  <h1 class="mb-4">日記一覧</h1>

  {% if object_list %}
    <ul class="list-group">

      {% for obj in object_list %}
        <li class="list-group-item d-flex justify-content-between align-items-center">

          <!-- タイトル（クリックで詳細） -->
          <a href="{% url 'myapp:detail' obj.pk %}">
            {{ obj.title }}
          </a>

          <!-- 操作ボタン -->
          {% if user.is_authenticated %}
          <div class="btn-group btn-group-sm">

            <a href="{% url 'myapp:update' obj.pk %}" class="btn btn-outline-warning">
              編集
            </a>

            <a href="{% url 'myapp:delete' obj.pk %}" class="btn btn-danger">
              削除
            </a>
          </div>
          {% endif %}

        </li>
      {% endfor %}

    </ul>

  {% else %}
    <div class="alert alert-info">
      日記はまだありません。
    </div>
  {% endif %}

</div>
{% endblock %}
