{% extends "base.html" %}

{% block title %}日記詳細{% endblock %}

{% block content %}
<div class="container mt-4">

  <h1>{{ object.title }}</h1>

  <p class="text-muted">
    作成者: {{ object.author }} |
    投稿日: {{ object.created_at|date:"Y/m/d H:i" }}
</p>


  <hr>

  <div>
    {{ object.content|linebreaks }}
  </div>

  <div class="mt-3">
    <a href="{% url 'myapp:list' %}" class="btn btn-secondary">一覧に戻る</a>
    
    {% if user.is_authenticated %}
      <a href="{% url 'myapp:update' object.pk %}" class="btn btn-warning">編集</a>
      <a href="{% url 'myapp:delete' object.pk %}" class="btn btn-danger">削除</a>
    {% endif %}
  </div>

</div>
{% endblock %}
