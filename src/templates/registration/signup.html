<!-- templates/registration/signup.html -->
{% extends "base.html" %}

{% block title %}ユーザー登録 | Django Canape{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">ユーザー登録</h1>

    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="auth-button">登録</button>
    </form>

    <p class="auth-note">
      すでにアカウントをお持ちですか？
      <a href="{% url 'login' %}">ログインはこちら</a>
    </p>
  </div>
</div>
{% endblock %}
