{% extends "base.html" %}

{% block title %}ログイン | Django Canape{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">ログイン</h1>

    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="auth-button">ログイン</button>
    </form>

    {% if request.GET.next %}
      <div class="auth-note">ログイン後に元のページへ戻ります</div>
    {% endif %}
  </div>
</div>
{% endblock %}
